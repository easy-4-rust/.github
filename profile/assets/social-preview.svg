<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Easy-4-Rust social preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="50%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#9a3412"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Document icon grid (right side) -->
  <g transform="translate(900, 200)" opacity="0.30">
    <rect x="0" y="0" width="100" height="120" rx="6" fill="#16a34a"/>
    <rect x="120" y="-30" width="100" height="120" rx="6" fill="#dc2626"/>
    <rect x="240" y="20" width="100" height="120" rx="6" fill="#2563eb"/>
    <rect x="60" y="160" width="100" height="120" rx="6" fill="#0891b2"/>
    <rect x="180" y="190" width="100" height="120" rx="6" fill="#7c3aed"/>
  </g>

  <!-- Rust gear watermark (left) -->
  <g transform="translate(160, 140)" opacity="0.30">
    <circle r="50" fill="none" stroke="#fb923c" stroke-width="6"/>
    <g stroke="#fb923c" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-65" x2="0" y2="-50"/>
      <line x1="0" y1="50" x2="0" y2="65"/>
      <line x1="-65" y1="0" x2="-50" y2="0"/>
      <line x1="50" y1="0" x2="65" y2="0"/>
    </g>
    <circle r="20" fill="#fb923c"/>
  </g>

  <!-- Title -->
  <text x="240" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="120" font-weight="800" fill="url(#title)" letter-spacing="-3">Easy-4-Rust</text>

  <!-- Subtitle -->
  <text x="244" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="32" font-weight="400" fill="#fed7aa" letter-spacing="0.5">
    Easy-to-use toolkits for Rust ecosystem
  </text>

  <!-- Tagline -->
  <text x="244" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="300" fill="#fdba74" letter-spacing="2">
    Excel · PDF · OFD · DOCX · Sa-Token · Hutool
  </text>

  <!-- Partme-AI badge -->
  <g transform="translate(244, 460)">
    <rect x="0" y="0" width="320" height="50" rx="25" fill="#6366f1"/>
    <text x="160" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">
      🧠 Part of partme-ai ecosystem
    </text>
  </g>

  <!-- Rust badge -->
  <g transform="translate(590, 460)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#fb923c"/>
    <text x="100" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">
      🦀 Rust
    </text>
  </g>

  <rect x="0" y="628" width="1280" height="12" fill="url(#title)"/>
</svg>